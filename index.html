<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFramework — SPA Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    nav {
      display: flex;
      gap: 1rem;
      padding: 1rem 2rem;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
    }

    nav a {
      color: #8b8bff;
      text-decoration: none;
      font-weight: 500;
    }

    nav a:hover { color: #fff; }

    #app {
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .page h1 { margin-bottom: 1rem; font-size: 1.8rem; }
    .page p  { margin-bottom: 0.5rem; color: #aaa; line-height: 1.6; }

    .counter {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      display: inline-block;
    }

    .counter h2 { margin-bottom: 1rem; font-size: 1rem; color: #888; text-transform: uppercase; letter-spacing: 0.1em; }

    .value {
      font-size: 4rem !important;
      font-weight: 700;
      color: #8b8bff !important;
      text-align: center;
      line-height: 1;
      margin-bottom: 0.25rem !important;
    }

    .derived {
      text-align: center;
      font-size: 0.85rem !important;
      color: #555 !important;
      margin-bottom: 1rem !important;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .actions button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #3a3a5a;
      background: #0f0f1a;
      color: #e8e8f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.15s;
    }

    .actions button:hover { background: #2a2a3a; }

    .status {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #4caf50 !important;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#/">Home</a>
    <a href="#/about">About</a>
  </nav>
  <div id="app"></div>
  <script type="module" src="./app/main.js"></script>
</body>
</html>
