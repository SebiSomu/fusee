<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyFramework — SPA Demo</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    nav {
      display: flex;
      gap: 1rem;
      padding: 1rem 2rem;
      background: #1a1a24;
      border-bottom: 1px solid #2a2a3a;
    }

    nav a {
      color: #ff3333;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    nav a.active {
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* Temă Red Fusée */
    #app h1 {
      color: #ff3333;
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
      margin-bottom: 1rem;
    }

    #app p {
      color: #ff9999;
      opacity: 0.9;
    }

    nav a:hover {
      color: #fff;
    }

    #app {
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .page h1 {
      margin-bottom: 1rem;
      font-size: 1.8rem;
    }

    .page p {
      margin-bottom: 0.5rem;
      color: #aaa;
      line-height: 1.6;
    }

    .counter {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      display: inline-block;
    }

    .counter h2 {
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .value {
      font-size: 4rem !important;
      font-weight: 700;
      color: #8b8bff !important;
      text-align: center;
      line-height: 1;
      margin-bottom: 0.25rem !important;
    }

    .derived {
      text-align: center;
      font-size: 0.85rem !important;
      color: #555 !important;
      margin-bottom: 1rem !important;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .actions button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #3a3a5a;
      background: #0f0f1a;
      color: #e8e8f0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.15s;
    }

    .actions button:hover {
      background: #2a2a3a;
    }

    .primary-btn {
      padding: 0.6rem 1.25rem;
      border: none;
      background: #8b8bff;
      color: #fff;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s, transform 0.1s;
    }

    .primary-btn:hover {
      background: #7171e5;
    }

    .primary-btn:active {
      transform: scale(0.97);
    }

    .status {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #4caf50 !important;
    }

    .positive {
      color: #8b8bff !important;
    }

    .negative {
      color: #ff6b6b !important;
    }

    .actions button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Composables demo ──────────────────────────────────────────── */
    .demo-card {
      background: #13131d;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .demo-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8f0;
      margin-bottom: 0.35rem;
    }

    .demo-desc {
      font-size: 0.8rem;
      color: #555 !important;
      margin-bottom: 1rem !important;
    }

    .counter-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1rem;
    }

    .big-num {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.2s;
    }

    .big-num.even {
      color: #8b8bff;
    }

    .big-num.odd {
      color: #ff3333;
    }

    .derived-label {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.25rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .cmp-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      border: 1px solid #2a2a3a;
      background: #0f0f1a;
      color: #e8e8f0;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s;
    }

    .cmp-btn:hover {
      background: #1f1f30;
    }

    .cmp-btn.plus {
      border-color: #8b8bff;
      color: #8b8bff;
    }

    .cmp-btn.minus {
      border-color: #ff3333;
      color: #ff3333;
    }

    .cmp-btn.reset {
      border-color: #555;
      color: #888;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-blue {
      background: rgba(139, 139, 255, 0.15);
      color: #8b8bff;
    }

    .badge-red {
      background: rgba(255, 51, 51, 0.12);
      color: #ff3333;
    }

    .mouse-display {
      display: flex;
      gap: 2rem;
      font-size: 1.1rem;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .mouse-display strong {
      color: #e8e8f0;
    }

    .cmp-input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0f0f1a;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .cmp-input:focus {
      border-color: #8b8bff;
    }

    /* ── f-classList demo styles (Home page) ─────────────────────── */
    .demo-box {
      width: 200px;
      height: 100px;
      background: #1a1a24;
      border: 2px solid #3a3a5a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .demo-box.active {
      border-color: #8b8bff;
      background: rgba(139, 139, 255, 0.1);
      box-shadow: 0 0 20px rgba(139, 139, 255, 0.3);
    }

    .demo-box.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .demo-box.is-large {
      width: 300px;
      height: 150px;
      font-size: 1.2rem;
    }

    .btn-on {
      background: #8b8bff !important;
      border-color: #8b8bff !important;
      color: #fff !important;
    }

    .btn-off {
      background: #1a1a24 !important;
      border-color: #555 !important;
      color: #888 !important;
    }

    .test-classlist h1 {
      color: #f59e0b;
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
    }

    .test-classlist .subtitle {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .demo-section {
      background: #13131d;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .demo-section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #e8e8f0;
      margin-bottom: 1rem;
    }

    .demo-box {
      width: 200px;
      height: 100px;
      background: #1a1a24;
      border: 2px solid #3a3a5a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .demo-box.active {
      border-color: #8b8bff;
      background: rgba(139, 139, 255, 0.1);
      box-shadow: 0 0 20px rgba(139, 139, 255, 0.3);
    }

    .demo-box.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .demo-box.is-large {
      width: 300px;
      height: 150px;
      font-size: 1.2rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .controls button {
      padding: 0.5rem 1rem;
      border: 1px solid #3a3a5a;
      background: #0f0f1a;
      color: #e8e8f0;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .controls button:hover {
      background: #2a2a3a;
    }

    .controls button.btn-on {
      background: #8b8bff;
      border-color: #8b8bff;
      color: #fff;
    }

    .controls button.btn-off {
      background: #1a1a24;
      border-color: #555;
      color: #888;
    }

    .theme-box {
      padding: 1.5rem;
      border-radius: 8px;
      border: 2px solid #3a3a5a;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .theme-box.theme-light {
      background: rgba(245, 158, 11, 0.1);
      border-color: #f59e0b;
      color: #f59e0b;
    }

    .theme-box.theme-dark {
      background: rgba(139, 139, 255, 0.1);
      border-color: #8b8bff;
      color: #8b8bff;
    }

    .theme-toggle {
      padding: 0.6rem 1.25rem;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .theme-toggle:hover {
      background: #d97706;
    }

    .action-btn {
      padding: 0.75rem 1.5rem;
      border: 2px solid #3a3a5a;
      background: #1a1a24;
      color: #e8e8f0;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .action-btn.btn-primary {
      border-color: #8b8bff;
      color: #8b8bff;
    }

    .action-btn.btn-primary:hover {
      background: rgba(139, 139, 255, 0.1);
    }

    .action-btn.btn-loading {
      border-color: #f59e0b;
      color: #f59e0b;
      animation: pulse 1.5s infinite;
    }

    .action-btn.btn-error {
      border-color: #ff3333;
      background: rgba(255, 51, 51, 0.1);
      color: #ff3333;
    }

    .action-btn.btn-active {
      transform: scale(0.95);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .info-section {
      background: #0f0f1a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 2rem;
    }

    .info-section h2 {
      color: #34d399;
      margin-bottom: 1rem;
    }

    .info-section ul {
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .info-section li {
      color: #aaa;
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }

    .info-section li strong {
      color: #e8e8f0;
    }

    .code-example {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 1rem;
    }

    .code-example pre {
      color: #8b8bff;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      margin: 0;
      overflow-x: auto;
    }

    /* ── Event Delegation Demo Styles ───────────────────────────────── */
    .test-events h1 {
      color: #ff3333;
      text-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
    }

    .test-events .subtitle {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .demo-btn {
      padding: 0.75rem 1rem;
      border: 2px solid #3a3a5a;
      background: #0f0f1a;
      color: #e8e8f0;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }

    .demo-btn:hover {
      background: #2a2a3a;
      transform: translateY(-2px);
    }

    .demo-btn.native {
      border-color: #34d399;
      color: #34d399;
    }

    .demo-btn.native:hover {
      background: rgba(52, 211, 153, 0.1);
    }

    .counter-display {
      font-size: 1.1rem;
      color: #aaa;
    }

    .counter-display strong {
      color: #e8e8f0;
      font-size: 1.3rem;
    }

    .stop-demo {
      cursor: pointer;
      transition: background 0.15s;
    }

    .stop-demo:hover {
      background: #252535;
    }
  </style>
</head>

<body>
  <nav>
    <a href="/" f-link>Home</a>
    <a href="/about" f-link>About</a>
    <a href="/test-for" f-link>Loops Test</a>
    <a href="/dynamic" f-link style="color: #ec4899;">Dynamic Components</a>
    <a href="/composables" f-link style="color: #34d399;">Composables</a>
    <a href="/router-example" f-link style="color: #8b8bff;">🔗 Router Example</a>
  </nav>
  <div id="app"></div>
  <script type="module" src="./app/main.ts"></script>
</body>

</html>
